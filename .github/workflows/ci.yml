name: CI - Portal Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    name: Build & Test .NET Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore portal/backend/Portal.Api/Portal.Api.csproj

      - name: Build
        run: dotnet build portal/backend/Portal.Api/Portal.Api.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test portal/backend/Portal.Api/Portal.Api.csproj --no-build --configuration Release --verbosity normal

  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/frontend/package-lock.json

      - name: Install dependencies
        working-directory: portal/frontend
        run: npm ci

      - name: Build
        working-directory: portal/frontend
        run: npm run build

  docker-build:
    name: Docker Build (backend + frontend)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build -f portal/deployment/docker/Dockerfile.backend -t compliance-portal-backend:ci .

      - name: Build frontend Docker image
        run: |
          docker build -f portal/deployment/docker/Dockerfile.frontend -t compliance-portal-frontend:ci .
